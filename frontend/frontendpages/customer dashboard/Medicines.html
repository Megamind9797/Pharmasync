.dashboard{

/* SIDEBAR */

    .dashboard-sidebar{

        width:260px;
        height:100vh;

        background:
        linear-gradient(to bottom,#10c9a7,#0f82ff);

        color:white;

        position:fixed;

        top:0;

        margin-bottom:15px;
    }

    .dashboard-logo h1{
        font-size:36px;
    }






    /* MENU */

    .dashboard-menu{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .dashboard-menu a{

        color:white;

        text-decoration:none;

        padding:14px;

        border-radius:12px;

        transition:0.3s;

        font-size:18px;

    }

    .dashboard-menu a:hover{
        background:rgba(255,255,255,0.2);
    }



.main-content{
margin-left:270px;
width:calc(100% - 240px);
padding:25px;
}

.topbar{
display:flex;
justify-content:space-between;

margin-bottom:25px;
}

.topbar input{
width:70%;
padding:16px 22px;
border:none;
outline:none;
border-radius:18px;
}

.top-icons{
font-size:22px;

gap:20px;
}

.hero{
background:linear-gradient(
135deg,
#10c7a7,
#1d88e8

.hero h1{
font-size:52px;

.hero p{

.section-title{
margin-bottom:25px;
font-size:35px;
}

.medicine-grid{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(300px,1fr)
);
gap:25px;
}

.medicine-card{
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:
0 8px 20px
rgba(0,0,0,.08);
}

.medicine-card img{
width:100%;
height:220px;
object-fit:cover;
}

.medicine-info{
padding:20px;
}

.medicine-info h3{
font-size:28px;
margin-bottom:10px;
}

.medicine-info p{
color:#666;
margin-bottom:15px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-size:28px;
font-weight:700;
color:#10b981;
}

.add-btn{
border:none;
padding:12px 25px;
border-radius:12px;
cursor:pointer;
background:
linear-gradient(
135deg,
#10c7a7,
#1d88e8
);
color:white;
font-weight:600;
}

    </aside>


    <!-- Main Content -->

    <main class="main-content">

        <div class="topbar">

            <input
                type="text"
                id="searchBox"
                placeholder="Search medicines..."
            >

            <div class="top-icons">
                <span>🔔</span>
                <span><a href="cart.html">🛒</a></span>   
                <span><a href="customer-profile.html">👤</a></span>
            </div>

        </div>

        <div class="hero">

            <h1>Available Medicines</h1>

        </div>

        <h2 class="section-title">
            Medicines Catalog
        </h2>

        <div id="medicineGrid"
             class="medicine-grid">

        </div>

    </main>

</div>

fetch("http://127.0.0.1:5000/all-medicines")
.then(res => res.json())
.then(medicines => {

    const grid = document.getElementById("medicineGrid");

    medicines.forEach(medicine => {

        grid.innerHTML += `
        <div class="medicine-card">

            <img src="images/default-medicine.jpg">

            <div class="medicine-info">

                <h3>${medicine[0]}</h3>

                <p>Available Medicine</p>

                <div class="bottom">

                   

                    <button
                        class="add-btn"
                        data-name="${medicine[0]}"
                        data-price="${medicine[1]}">
                        Add
                    </button>

                </div>

            </div>

        </div>
        `;
    });

});





document.addEventListener("click", function(e){

    if(e.target.classList.contains("add-btn")){

        const medicineName =
        e.target.dataset.name;

        localStorage.setItem(
            "selectedMedicine",
            medicineName
        );

        window.location.href =
        "../medicine-options.html";

    }

});
